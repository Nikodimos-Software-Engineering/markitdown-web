<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkItDown Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>MarkItDown</h1>
      <p>Convert documents to Markdown instantly</p>
    </header>

    <div class="drop-zone" id="dropZone">
      <div class="drop-content">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="drop-text">Drag & drop a file here</p>
        <p class="drop-sub">or click to browse</p>
        <p class="formats">PDF, DOCX, PPTX, XLSX, images, EPUB, HTML, CSV, JSON, XML & more</p>
      </div>
      <input type="file" id="fileInput" hidden>
    </div>

    <div class="file-bar" id="fileBar" hidden>
      <span class="file-bar-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </span>
      <span class="file-bar-name" id="fileName"></span>
      <span class="file-bar-size" id="fileSize"></span>
      <button class="file-bar-close" id="clearBtn" title="Remove file">&times;</button>
    </div>

    <button class="btn" id="convertBtn" disabled>Convert to Markdown</button>

    <div class="spinner" id="spinner" hidden>
      <div class="loader"></div>
      <p>Converting...</p>
    </div>

    <button class="btn btn-success" id="downloadBtn" hidden>Download Markdown</button>

    <div class="error" id="error" hidden></div>

    <footer>
      <p>Powered by <a href="https://github.com/microsoft/markitdown" target="_blank">Microsoft MarkItDown</a></p>
    </footer>
  </div>

  <script>
    const API_URL = "https://markitdown-web-8w0j.onrender.com";

    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const fileBar = document.getElementById("fileBar");
    const fileName = document.getElementById("fileName");
    const fileSize = document.getElementById("fileSize");
    const clearBtn = document.getElementById("clearBtn");
    const convertBtn = document.getElementById("convertBtn");
    const spinner = document.getElementById("spinner");
    const downloadBtn = document.getElementById("downloadBtn");
    const errorEl = document.getElementById("error");

    let selectedFile = null;
    let downloadUrl = null;
    const MAX_SIZE = 10 * 1024 * 1024;

    dropZone.addEventListener("click", () => fileInput.click());

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    clearBtn.addEventListener("click", resetAll);

    downloadBtn.addEventListener("click", () => {
      if (!downloadUrl) return;
      const a = document.createElement("a");
      a.href = downloadUrl;
      a.download = selectedFile.name.replace(/\.[^.]+$/, "") + ".md";
      document.body.appendChild(a);
      a.click();
      a.remove();
    });

    function handleFile(file) {
      errorEl.hidden = true;

      if (file.size > MAX_SIZE) {
        showError("File too large. Maximum size is 10 MB.");
        return;
      }

      if (file.size === 0) {
        showError("File is empty.");
        return;
      }

      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = (file.size / 1024).toFixed(1) + " KB";
      dropZone.hidden = true;
      fileBar.hidden = false;
      convertBtn.hidden = false;
      convertBtn.disabled = false;
    }

    convertBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      convertBtn.disabled = true;
      spinner.hidden = false;
      errorEl.hidden = true;
      downloadBtn.hidden = true;
      if (downloadUrl) {
        URL.revokeObjectURL(downloadUrl);
        downloadUrl = null;
      }

      const formData = new FormData();
      formData.append("file", selectedFile);

      try {
        const res = await fetch(`${API_URL}/upload`, {
          method: "POST",
          body: formData,
        });

        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.detail || `Server error (${res.status})`);
        }

        const blob = await res.blob();
        downloadUrl = URL.createObjectURL(blob);
        convertBtn.hidden = true;
        downloadBtn.hidden = false;
      } catch (err) {
        showError(err.message);
        convertBtn.disabled = false;
      } finally {
        spinner.hidden = true;
      }
    });

    function resetAll() {
      selectedFile = null;
      if (downloadUrl) {
        URL.revokeObjectURL(downloadUrl);
        downloadUrl = null;
      }
      fileInput.value = "";
      dropZone.hidden = false;
      fileBar.hidden = true;
      convertBtn.hidden = false;
      convertBtn.disabled = true;
      downloadBtn.hidden = true;
      spinner.hidden = true;
      errorEl.hidden = true;
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.hidden = false;
    }
  </script>
</body>
</html>
